name: Deploy Node.js Backend

on:
  push:
    branches:
      - main # 如果你的主分支叫 master，请改成 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取最新代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 使用 Rsync 同步代码到服务器（会自动删除多余文件）
      - name: Sync files via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_PASSWORD }} # 注意：这个插件默认用密钥，但也支持密码
          ARGS: "-avz --delete" # --delete 就是实现“本地删了服务器也删”的魔法指令
          SOURCE: "./"
          TARGET: "/www/wwwroot/todo-api"
          # 极其重要：务必把 node_modules 和环境变量文件排除掉！
          # 否则它发现你 GitHub 上没有 node_modules，会把服务器上的 node_modules 也给删了！
          EXCLUDE: "node_modules/, .env, .git/, .github/, *.sh"

      # 3. 登录服务器安装依赖并重启服务
      - name: Execute SSH Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # 进入后端目录
            cd /www/wwwroot/todo-api 

            # 安装生产环境依赖（跳过 devDependencies）
            npm install --omit=dev

            # 重启 PM2 中的所有 Node 服务
            # 如果你的宝塔 Node 项目名叫 test，也可以写成 pm2 restart test
            pm2 restart test
